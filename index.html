<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Income & Expense Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .fade-in { animation: fadeIn 0.2s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .btn-transition { transition: all 0.2s ease; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        /* Prevent pull-to-refresh on mobile for a more app-like feel */
        body { overscroll-behavior-y: none; } 
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen relative pb-20"> <div class="max-w-4xl mx-auto p-3 sm:p-6">
        
        <header class="flex justify-between items-center mb-4 sm:mb-8 fade-in">
            <h1 class="text-xl sm:text-3xl font-bold text-slate-900 tracking-tight">Financial Tracker <span class="text-teal-600">.</span></h1>
            <button onclick="clearAllData()" class="text-xs sm:text-sm text-red-500 hover:text-red-700 btn-transition font-medium px-2 py-1 bg-red-50 rounded-md">Clear Data</button>
        </header>

        <div id="dashboardView" class="space-y-4 sm:space-y-6 block">
            
            <div class="bg-white p-2 sm:p-4 rounded-xl sm:rounded-2xl shadow-sm border border-slate-100 flex overflow-x-auto hide-scrollbar gap-2 fade-in">
                <button onclick="setDashboardFilter('today')" class="dash-filter-btn bg-slate-800 text-white px-4 py-2 rounded-lg text-sm font-medium btn-transition whitespace-nowrap">Today</button>
                <button onclick="setDashboardFilter('week')" class="dash-filter-btn bg-slate-100 text-slate-600 hover:bg-slate-200 px-4 py-2 rounded-lg text-sm font-medium btn-transition whitespace-nowrap">This Week</button>
                <button onclick="setDashboardFilter('month')" class="dash-filter-btn bg-slate-100 text-slate-600 hover:bg-slate-200 px-4 py-2 rounded-lg text-sm font-medium btn-transition whitespace-nowrap">This Month</button>
                <button onclick="setDashboardFilter('all')" class="dash-filter-btn bg-slate-100 text-slate-600 hover:bg-slate-200 px-4 py-2 rounded-lg text-sm font-medium btn-transition whitespace-nowrap">All Time</button>
            </div>

            <div class="grid grid-cols-2 gap-3 sm:gap-4 fade-in" style="animation-delay: 0.05s;">
                <div class="bg-white p-4 sm:p-5 rounded-xl sm:rounded-2xl shadow-sm border border-slate-100 flex flex-col justify-center col-span-2 border-l-4 border-l-slate-800">
                    <p class="text-xs sm:text-sm font-medium text-slate-500 mb-1">Current Balance</p>
                    <h3 class="text-2xl sm:text-3xl font-bold text-slate-800" id="dashBalance">₹0.00</h3>
                </div>
                <div class="bg-white p-3 sm:p-5 rounded-xl sm:rounded-2xl shadow-sm border border-slate-100 flex flex-col justify-center border-l-4 border-l-teal-500">
                    <p class="text-xs font-medium text-slate-500 mb-1">Income</p>
                    <h3 class="text-lg sm:text-2xl font-bold text-teal-600 truncate" id="dashIncome">₹0.00</h3>
                </div>
                <div class="bg-white p-3 sm:p-5 rounded-xl sm:rounded-2xl shadow-sm border border-slate-100 flex flex-col justify-center border-l-4 border-l-red-400">
                    <p class="text-xs font-medium text-slate-500 mb-1">Expenses</p>
                    <h3 class="text-lg sm:text-2xl font-bold text-slate-700 truncate" id="dashExpense">₹0.00</h3>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 sm:gap-6 fade-in" style="animation-delay: 0.1s;">
                
                <div class="bg-white p-4 sm:p-5 rounded-xl sm:rounded-2xl shadow-sm border border-slate-100">
                    <h3 class="text-xs sm:text-sm font-semibold text-slate-600 mb-2 sm:mb-4 text-center uppercase tracking-wider">Expense Breakdown</h3>
                    <div class="flex justify-center items-center h-40 sm:h-48">
                        <canvas id="categoryChart"></canvas>
                    </div>
                </div>
                
                <div class="bg-white p-4 sm:p-5 rounded-xl sm:rounded-2xl shadow-sm border border-slate-100 flex flex-col">
                    <div class="flex justify-between items-center mb-3">
                        <h2 class="text-xs sm:text-sm font-semibold text-slate-600 uppercase tracking-wider">Recent</h2>
                        <button onclick="switchView('allTransactionsView')" class="text-xs text-blue-600 font-semibold">View All</button>
                    </div>
                    <div class="overflow-x-auto flex-grow">
                        <table class="w-full text-left border-collapse">
                            <tbody id="recentTransactionList" class="text-sm divide-y divide-slate-50"></tbody>
                        </table>
                    </div>
                    <div id="recentEmptyState" class="hidden text-center py-4 text-slate-400 text-xs">No data for this period.</div>
                </div>
            </div>
        </div>

        <div id="allTransactionsView" class="hidden fade-in bg-white p-4 sm:p-8 rounded-xl sm:rounded-2xl shadow-sm border border-slate-100 min-h-[70vh]">
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-4 border-b border-slate-100 pb-4">
                <div class="flex items-center gap-3">
                    <button onclick="switchView('dashboardView')" class="text-slate-500 hover:text-slate-800 btn-transition flex items-center gap-1 font-medium bg-slate-50 hover:bg-slate-100 px-3 py-1.5 rounded-lg border border-slate-100 text-sm">
                        &larr; Back
                    </button>
                    <h2 class="text-lg sm:text-xl font-bold text-slate-800">Database</h2>
                </div>
                <button onclick="exportCSV()" class="text-xs sm:text-sm bg-teal-50 text-teal-700 hover:bg-teal-100 px-4 py-2 rounded-lg font-medium btn-transition border border-teal-100 w-full sm:w-auto">
                    Export to CSV
                </button>
            </div>

            <div class="flex gap-2 mb-4">
                <input type="text" id="searchInput" onkeyup="updateFullListView()" placeholder="Search..." class="p-2 text-sm bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none flex-grow">
                <select id="listTypeFilter" onchange="updateFullListView()" class="p-2 text-sm bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none w-28">
                    <option value="all">All</option>
                    <option value="income">In</option>
                    <option value="expense">Out</option>
                </select>
            </div>

            <div class="overflow-x-auto rounded-lg border border-slate-100">
                <table class="w-full text-left border-collapse bg-white min-w-[500px]">
                    <thead class="bg-slate-50">
                        <tr class="text-[10px] sm:text-xs uppercase tracking-wider text-slate-500 border-b border-slate-200">
                            <th class="p-3 font-semibold w-20">Date</th>
                            <th class="p-3 font-semibold">Item</th>
                            <th class="p-3 font-semibold text-right">Amount</th>
                            <th class="p-3 text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="fullTransactionList" class="text-xs sm:text-sm divide-y divide-slate-100"></tbody>
                </table>
            </div>
            <div id="fullEmptyState" class="hidden text-center py-10 text-slate-400 text-sm bg-slate-50 border-x border-b border-slate-100 rounded-b-lg">
                No entries found.
            </div>
        </div>

    </div>

    <button onclick="openAddModal()" class="fixed bottom-6 right-6 sm:bottom-10 sm:right-10 bg-slate-800 hover:bg-slate-900 text-white rounded-full h-14 w-14 flex items-center justify-center shadow-xl z-40 btn-transition transform hover:scale-105 border-2 border-white">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4" /></svg>
    </button>

    <div id="addModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 hidden flex items-end sm:items-center justify-center sm:p-4 transition-opacity">
        <div class="bg-white rounded-t-2xl sm:rounded-2xl shadow-2xl w-full max-w-md fade-in max-h-[90vh] overflow-y-auto pb-6 sm:pb-0">
            <div class="sticky top-0 bg-white flex justify-between items-center p-5 border-b border-slate-100 z-10 rounded-t-2xl">
                <h3 class="text-lg font-bold text-slate-800">Add New Entry</h3>
                <button onclick="closeAddModal()" class="text-slate-400 hover:text-slate-600 bg-slate-100 rounded-full h-8 w-8 flex items-center justify-center">&times;</button>
            </div>
            <div class="p-5">
                <form id="transactionForm" class="space-y-4">
                    <div class="flex bg-slate-100 p-1 rounded-lg mb-4">
                        <label class="flex-1 text-center cursor-pointer">
                            <input type="radio" name="typeInput" value="expense" checked onchange="updateFormCategories('form')" class="peer hidden">
                            <div class="peer-checked:bg-white peer-checked:shadow-sm peer-checked:text-slate-800 text-slate-500 text-sm font-semibold py-2 rounded-md transition-all">Expense</div>
                        </label>
                        <label class="flex-1 text-center cursor-pointer">
                            <input type="radio" name="typeInput" value="income" onchange="updateFormCategories('form')" class="peer hidden">
                            <div class="peer-checked:bg-white peer-checked:shadow-sm peer-checked:text-teal-600 text-slate-500 text-sm font-semibold py-2 rounded-md transition-all">Income</div>
                        </label>
                    </div>
                    
                    <div>
                        <label class="block text-xs font-medium text-slate-500 mb-1">Date</label>
                        <input type="date" id="dateInput" required class="w-full p-3 text-sm bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-slate-800 focus:outline-none transition-all">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-slate-500 mb-1">Description / Item</label>
                        <input type="text" id="nameInput" placeholder="e.g., Salary, Coffee, Laptop" required class="w-full p-3 text-sm bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-slate-800 focus:outline-none transition-all">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-slate-500 mb-1">Category</label>
                        <select id="categoryInput" class="w-full p-3 text-sm bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-slate-800 focus:outline-none transition-all">
                            </select>
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-slate-500 mb-1">Amount</label>
                        <div class="relative">
                            <span class="absolute left-3 top-3 text-slate-400 font-medium">₹</span>
                            <input type="number" id="amountInput" placeholder="0.00" step="0.01" required class="w-full p-3 pl-8 text-sm bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-slate-800 focus:outline-none transition-all">
                        </div>
                    </div>
                    <button type="submit" class="w-full bg-slate-800 hover:bg-slate-900 text-white font-bold py-3.5 rounded-lg btn-transition shadow-lg mt-6">
                        Save Entry
                    </button>
                </form>
            </div>
        </div>
    </div>

    <div id="editModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 hidden flex items-end sm:items-center justify-center sm:p-4">
        <div class="bg-white rounded-t-2xl sm:rounded-2xl shadow-2xl w-full max-w-md fade-in max-h-[90vh] overflow-y-auto pb-6 sm:pb-0">
            <div class="sticky top-0 bg-white flex justify-between items-center p-5 border-b border-slate-100 z-10 rounded-t-2xl">
                <h3 class="text-lg font-bold text-slate-800">Edit Entry</h3>
                <button onclick="closeEditModal()" class="text-slate-400 hover:text-slate-600 bg-slate-100 rounded-full h-8 w-8 flex items-center justify-center">&times;</button>
            </div>
            <div class="p-5">
                <form id="editForm" class="space-y-4">
                    <input type="hidden" id="editId">
                    
                    <div class="flex bg-slate-100 p-1 rounded-lg mb-4">
                        <label class="flex-1 text-center cursor-pointer">
                            <input type="radio" name="editTypeInput" value="expense" onchange="updateFormCategories('modal')" class="peer hidden">
                            <div class="peer-checked:bg-white peer-checked:shadow-sm peer-checked:text-slate-800 text-slate-500 text-sm font-semibold py-2 rounded-md transition-all">Expense</div>
                        </label>
                        <label class="flex-1 text-center cursor-pointer">
                            <input type="radio" name="editTypeInput" value="income" onchange="updateFormCategories('modal')" class="peer hidden">
                            <div class="peer-checked:bg-white peer-checked:shadow-sm peer-checked:text-teal-600 text-slate-500 text-sm font-semibold py-2 rounded-md transition-all">Income</div>
                        </label>
                    </div>

                    <div>
                        <label class="block text-xs font-medium text-slate-500 mb-1">Date</label>
                        <input type="date" id="editDate" required class="w-full p-3 text-sm bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-slate-800 focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-slate-500 mb-1">Description / Item</label>
                        <input type="text" id="editName" required class="w-full p-3 text-sm bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-slate-800 focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-slate-500 mb-1">Category</label>
                        <select id="editCategory" class="w-full p-3 text-sm bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-slate-800 focus:outline-none">
                            </select>
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-slate-500 mb-1">Amount</label>
                        <div class="relative">
                            <span class="absolute left-3 top-3 text-slate-400 font-medium">₹</span>
                            <input type="number" id="editAmount" step="0.01" required class="w-full p-3 pl-8 text-sm bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-slate-800 focus:outline-none">
                        </div>
                    </div>
                    <button type="submit" class="w-full bg-slate-800 hover:bg-slate-900 text-white font-bold py-3.5 rounded-lg shadow-lg mt-6 btn-transition">
                        Save Changes
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script>
        // --- Categories Configuration ---
        const expenseCategories = ['Groceries', 'Transport', 'Electronics', 'Entertainment', 'Utilities', 'Business', 'Custom'];
        const incomeCategories = ['Salary', 'Freelance', 'Business Sales', 'Investments', 'Gift', 'Custom'];

        function updateFormCategories(target, preselected = null) {
            let typeSelected, selectElement;
            if (target === 'form') {
                typeSelected = document.querySelector('input[name="typeInput"]:checked').value;
                selectElement = document.getElementById('categoryInput');
            } else {
                typeSelected = document.querySelector('input[name="editTypeInput"]:checked').value;
                selectElement = document.getElementById('editCategory');
            }

            const options = typeSelected === 'income' ? incomeCategories : expenseCategories;
            selectElement.innerHTML = '';
            options.forEach(cat => {
                const opt = document.createElement('option');
                opt.value = cat;
                opt.textContent = cat;
                selectElement.appendChild(opt);
            });
            if (preselected && options.includes(preselected)) selectElement.value = preselected;
        }

        // --- State Management ---
        let transactions = JSON.parse(localStorage.getItem('transactions')) || JSON.parse(localStorage.getItem('expenses')) || [];
        transactions = transactions.map(t => ({ ...t, type: t.type || 'expense' }));
        saveData();

        let dashboardFilter = 'today';
        let chartInstance = null;
        document.getElementById('dateInput').valueAsDate = new Date();
        updateFormCategories('form');

        // --- Core Functions ---
        document.getElementById('transactionForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const type = document.querySelector('input[name="typeInput"]:checked').value;
            const newEntry = {
                id: Date.now().toString(),
                type: type,
                date: document.getElementById('dateInput').value,
                name: document.getElementById('nameInput').value,
                category: document.getElementById('categoryInput').value,
                amount: parseFloat(document.getElementById('amountInput').value)
            };
            transactions.push(newEntry);
            saveData();
            
            document.getElementById('nameInput').value = '';
            document.getElementById('amountInput').value = '';
            
            closeAddModal();
            updateDashboardView();
            updateFullListView();
        });

        function deleteEntry(id) {
            if(confirm("Are you sure you want to delete this entry?")) {
                transactions = transactions.filter(t => t.id !== id);
                saveData();
                updateDashboardView();
                updateFullListView();
            }
        }

        function clearAllData() {
            if(confirm('Are you sure you want to delete ALL your financial data? This cannot be undone.')) {
                transactions = [];
                localStorage.removeItem('expenses');
                saveData();
                updateDashboardView();
                updateFullListView();
            }
        }

        function saveData() { localStorage.setItem('transactions', JSON.stringify(transactions)); }

        // --- Modal Functions (Add & Edit) ---
        function openAddModal() {
            document.getElementById('dateInput').valueAsDate = new Date();
            document.getElementById('addModal').classList.remove('hidden');
        }
        function closeAddModal() {
            document.getElementById('addModal').classList.add('hidden');
        }

        function openEditModal(id) {
            const entry = transactions.find(t => t.id === id);
            if(!entry) return;
            document.getElementById('editId').value = entry.id;
            document.querySelector(`input[name="editTypeInput"][value="${entry.type}"]`).checked = true;
            updateFormCategories('modal', entry.category); 
            document.getElementById('editDate').value = entry.date;
            document.getElementById('editName').value = entry.name;
            document.getElementById('editAmount').value = entry.amount;
            document.getElementById('editModal').classList.remove('hidden');
        }
        function closeEditModal() {
            document.getElementById('editModal').classList.add('hidden');
        }

        document.getElementById('editForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const id = document.getElementById('editId').value;
            const index = transactions.findIndex(t => t.id === id);
            if(index !== -1) {
                transactions[index] = {
                    id: id,
                    type: document.querySelector('input[name="editTypeInput"]:checked').value,
                    date: document.getElementById('editDate').value,
                    name: document.getElementById('editName').value,
                    category: document.getElementById('editCategory').value,
                    amount: parseFloat(document.getElementById('editAmount').value)
                };
                saveData();
                closeEditModal();
                updateDashboardView();
                updateFullListView();
            }
        });

        // --- View Switching Logic ---
        function switchView(viewId) {
            document.getElementById('dashboardView').classList.add('hidden');
            document.getElementById('allTransactionsView').classList.add('hidden');
            document.getElementById(viewId).classList.remove('hidden');
            if(viewId === 'dashboardView') updateDashboardView();
            if(viewId === 'allTransactionsView') updateFullListView();
            window.scrollTo(0,0);
        }

        // --- DASHBOARD LOGIC ---
        function setDashboardFilter(filterType) {
            dashboardFilter = filterType;
            document.querySelectorAll('.dash-filter-btn').forEach(btn => {
                btn.classList.remove('bg-slate-800', 'text-white');
                btn.classList.add('bg-slate-100', 'text-slate-600');
            });
            event.target.classList.remove('bg-slate-100', 'text-slate-600');
            event.target.classList.add('bg-slate-800', 'text-white');
            updateDashboardView();
        }

        function getDashboardFilteredData() {
            const today = new Date();
            today.setHours(0,0,0,0);
            return transactions.filter(t => {
                const tDate = new Date(t.date);
                tDate.setHours(0,0,0,0);
                if (dashboardFilter === 'today') return tDate.getTime() === today.getTime();
                if (dashboardFilter === 'week') {
                    const firstDay = new Date(today.setDate(today.getDate() - today.getDay()));
                    return tDate >= firstDay;
                }
                if (dashboardFilter === 'month') return tDate.getMonth() === new Date().getMonth() && tDate.getFullYear() === new Date().getFullYear();
                return true; 
            }).sort((a, b) => new Date(b.date) - new Date(a.date));
        }

        function updateDashboardView() {
            const data = getDashboardFilteredData();
            const income = data.filter(t => t.type === 'income').reduce((sum, t) => sum + t.amount, 0);
            const expense = data.filter(t => t.type === 'expense').reduce((sum, t) => sum + t.amount, 0);
            const balance = income - expense;

            document.getElementById('dashIncome').innerText = '₹' + income.toLocaleString(undefined, {minimumFractionDigits: 0, maximumFractionDigits: 0});
            document.getElementById('dashExpense').innerText = '₹' + expense.toLocaleString(undefined, {minimumFractionDigits: 0, maximumFractionDigits: 0});
            
            const balanceEl = document.getElementById('dashBalance');
            balanceEl.innerText = '₹' + balance.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
            if(balance < 0) {
                balanceEl.classList.remove('text-slate-800');
                balanceEl.classList.add('text-red-600');
            } else {
                balanceEl.classList.remove('text-red-600');
                balanceEl.classList.add('text-slate-800');
            }

            const recentList = document.getElementById('recentTransactionList');
            const emptyState = document.getElementById('recentEmptyState');
            recentList.innerHTML = '';
            const slicedData = data.slice(0, 4); // Only show 4 to save space
            
            if (slicedData.length === 0) {
                emptyState.classList.remove('hidden');
            } else {
                emptyState.classList.add('hidden');
                slicedData.forEach(t => {
                    const tr = document.createElement('tr');
                    const isIncome = t.type === 'income';
                    const amountColor = isIncome ? 'text-teal-600' : 'text-slate-800';
                    const sign = isIncome ? '+' : '-';
                    
                    tr.className = 'border-b border-slate-50 last:border-0';
                    tr.innerHTML = `
                        <td class="py-2.5 pr-2 text-xs text-slate-500 w-16 whitespace-nowrap">${t.date.substring(5)}</td>
                        <td class="py-2.5 font-medium text-slate-800 text-sm truncate max-w-[100px]">${t.name}</td>
                        <td class="py-2.5 text-right font-bold text-sm ${amountColor}">${sign}₹${t.amount.toFixed(0)}</td>
                    `;
                    recentList.appendChild(tr);
                });
            }
            renderChart(data);
        }

        // --- FULL LIST VIEW LOGIC ---
        function getFullListData() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const listType = document.getElementById('listTypeFilter').value;
            return transactions.filter(t => {
                if (searchTerm && !t.name.toLowerCase().includes(searchTerm)) return false;
                if (listType !== 'all' && t.type !== listType) return false;
                return true;
            }).sort((a, b) => new Date(b.date) - new Date(a.date));
        }

        function updateFullListView() {
            const data = getFullListData();
            const tbody = document.getElementById('fullTransactionList');
            const emptyState = document.getElementById('fullEmptyState');
            tbody.innerHTML = '';

            if (data.length === 0) {
                emptyState.classList.remove('hidden');
            } else {
                emptyState.classList.add('hidden');
                data.forEach(t => {
                    const tr = document.createElement('tr');
                    const isIncome = t.type === 'income';
                    const amountColor = isIncome ? 'text-teal-600' : 'text-slate-700';
                    const sign = isIncome ? '+' : '-';

                    tr.className = 'hover:bg-slate-50';
                    tr.innerHTML = `
                        <td class="p-3 text-slate-500 whitespace-nowrap">${t.date.substring(5)}</td>
                        <td class="p-3 font-medium text-slate-800">
                            ${t.name} <br> <span class="text-[10px] text-slate-400 bg-slate-100 px-1.5 py-0.5 rounded">${t.category}</span>
                        </td>
                        <td class="p-3 font-bold ${amountColor} text-right whitespace-nowrap">${sign}₹${t.amount.toFixed(2)}</td>
                        <td class="p-3 text-right whitespace-nowrap">
                            <button onclick="openEditModal('${t.id}')" class="text-blue-500 font-semibold px-2 py-1 mr-1 text-xs bg-blue-50 rounded">Edit</button>
                            <button onclick="deleteEntry('${t.id}')" class="text-red-500 font-semibold px-2 py-1 text-xs bg-red-50 rounded">Del</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            }
        }

        // --- CHART LOGIC (Expenses Only) ---
        function renderChart(data) {
            const ctx = document.getElementById('categoryChart').getContext('2d');
            const categoryTotals = {};
            const expenseData = data.filter(t => t.type === 'expense');

            expenseData.forEach(t => { categoryTotals[t.category] = (categoryTotals[t.category] || 0) + t.amount; });
            if (chartInstance) chartInstance.destroy();
            
            const labels = Object.keys(categoryTotals);
            if (labels.length === 0) {
                chartInstance = new Chart(ctx, {
                    type: 'doughnut',
                    data: { labels: ['No Data'], datasets: [{ data: [1], backgroundColor: ['#f8fafc'] }] },
                    options: { responsive: true, maintainAspectRatio: false, plugins: { tooltip: {enabled: false}, legend: {display: false} }, cutout: '75%' }
                });
                return;
            }

            chartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{
                        data: Object.values(categoryTotals),
                        backgroundColor: ['#0d9488', '#2563eb', '#8b5cf6', '#f59e0b', '#ef4444', '#10b981', '#64748b'],
                        borderWidth: 0,
                        hoverOffset: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { position: 'right', labels: { boxWidth: 8, font: { family: 'sans-serif', size: 10 } } } },
                    cutout: '75%'
                }
            });
        }

        // --- EXPORT FEATURE ---
        function exportCSV() {
            const data = getFullListData(); 
            if(data.length === 0) { alert("No data to export."); return; }
            let csvContent = "data:text/csv;charset=utf-8,Date,Type,Description,Category,Amount\n";
            data.forEach(row => { csvContent += `${row.date},${row.type.toUpperCase()},"${row.name}",${row.category},${row.amount}\r\n`; });
            const link = document.createElement("a");
            link.href = encodeURI(csvContent);
            link.download = "financial_tracker.csv";
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // Init App
        updateDashboardView();
        updateFullListView();
    </script>
</body>
</html>
